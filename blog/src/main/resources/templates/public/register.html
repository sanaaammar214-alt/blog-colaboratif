<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::body})}">
<body>
<section class="section" style="padding: 5rem 0;">
    <div class="container" style="max-width: 520px;">
        <h2 class="mb-1" style="font-family:'EB Garamond',serif;font-size:2rem;">Créer un compte</h2>
        <p class="text-muted mb-4">Rejoignez la communauté CollabInk</p>

        <div class="alert alert-danger d-flex align-items-center" th:if="${error}">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            <span th:text="${error}">Erreur</span>
        </div>

        <form th:action="@{/register}" method="post" class="p-4 border rounded-3 bg-white shadow-sm">

            <div class="mb-3">
                <label class="form-label fw-semibold">Nom complet <span class="text-danger">*</span></label>
                <!-- ✅ CORRECTION : name="nom" correspond au champ User.nom -->
                <input class="form-control" type="text" name="nom" placeholder="Jean Dupont" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Email <span class="text-danger">*</span></label>
                <input class="form-control" type="email" name="email" placeholder="votre@email.com" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Mot de passe <span class="text-danger">*</span></label>
                <input class="form-control" type="password" name="password" placeholder="Minimum 6 caractères" required minlength="6">
                <div class="form-text">Au moins 6 caractères.</div>
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold">Rôle</label>
                <select class="form-select" name="role">
                    <option value="LECTEUR" selected>Lecteur — Lire, commenter, liker</option>
                    <option value="AUTEUR">Auteur — Publier des articles</option>
                </select>
                <div class="form-text text-muted">Le rôle Admin ne peut être attribué que par un administrateur.</div>
            </div>

            <div class="mb-4 form-check">
                <input type="checkbox" class="form-check-input" id="conditions" name="conditionsAcceptees" required>
                <label class="form-check-label" for="conditions">
                    J'accepte les <a th:href="@{/conditions}" target="_blank" style="color:#c9a84c;">conditions de publication et les droits d'auteur</a>.
                </label>
            </div>

            <button class="btn w-100 fw-bold" type="submit"
                    style="background:#c9a84c;color:#111;border:none;padding:0.75rem;">
                Créer mon compte
            </button>
            <hr class="my-3">
            <p class="text-center mb-0 text-muted">
                Déjà un compte ?
                <a th:href="@{/login}" style="color:#c9a84c;">Se connecter</a>
            </p>
        </form>
    </div>
</section>
</body>
</html>
