<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Catégories — Admin · CollabInk</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&family=DM+Mono&display=swap" rel="stylesheet"/>
    <style>
        :root{--bg:#0a0a0f;--surface:#13131a;--border:#1e1e2e;--text:#e8e4dc;--muted:#6b6875;--accent:#c8102e;--gold:#c49a2a;--serif:'Playfair Display',serif;--sans:'DM Sans',sans-serif;--mono:'DM Mono',monospace;}
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        body{background:var(--bg);color:var(--text);font-family:var(--sans);font-weight:300;display:flex;min-height:100vh;}
        .sidebar{width:240px;min-width:240px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;}
        .sidebar-brand{padding:1.5rem;border-bottom:1px solid var(--border);}
        .sidebar-brand a{font-family:var(--serif);font-size:1.4rem;font-weight:700;text-decoration:none;color:var(--text);}
        .sidebar-brand a span{color:var(--accent);}
        .sidebar-brand p{font-family:var(--mono);font-size:0.58rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-top:0.2rem;}
        .sidebar-nav{flex:1;padding:1rem 0;}
        .nav-section{font-family:var(--mono);font-size:0.55rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);padding:1rem 1.5rem 0.4rem;}
        .nav-item{display:flex;align-items:center;gap:0.75rem;padding:0.65rem 1.5rem;text-decoration:none;color:var(--muted);font-size:0.85rem;transition:all 0.2s;border-left:2px solid transparent;}
        .nav-item:hover{color:var(--text);background:rgba(255,255,255,0.03);}
        .nav-item.active{color:var(--text);border-left-color:var(--accent);background:rgba(200,16,46,0.06);}
        .sidebar-footer{padding:1rem;border-top:1px solid var(--border);}
        .logout-form button{width:100%;padding:0.6rem;background:transparent;border:1px solid var(--border);color:var(--muted);font-family:var(--sans);font-size:0.75rem;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;transition:all 0.2s;}
        .logout-form button:hover{border-color:var(--accent);color:var(--accent);}
        .main{flex:1;overflow-y:auto;}
        .main-header{padding:2rem 2.5rem 1.5rem;border-bottom:1px solid var(--border);}
        .main-header h1{font-family:var(--serif);font-size:2rem;}
        .main-header p{font-family:var(--mono);font-size:0.65rem;letter-spacing:0.1em;color:var(--muted);margin-top:0.2rem;}
        .main-body{padding:2rem 2.5rem;display:grid;grid-template-columns:1fr 2fr;gap:2rem;}
        .add-card{background:var(--surface);border:1px solid var(--border);padding:1.5rem;}
        .add-card h3{font-family:var(--mono);font-size:0.62rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-bottom:1.2rem;}
        .field label{font-family:var(--mono);font-size:0.6rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:0.4rem;}
        .field input{width:100%;padding:0.7rem 0;background:transparent;border:none;border-bottom:1px solid var(--border);font-family:var(--sans);font-size:0.9rem;color:var(--text);outline:none;transition:border-color 0.2s;margin-bottom:1.2rem;}
        .field input:focus{border-bottom-color:var(--text);}
        .field input::placeholder{color:var(--muted);}
        .btn-add{width:100%;padding:0.7rem;background:var(--accent);border:none;color:#fff;font-family:var(--sans);font-size:0.72rem;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:background 0.2s;}
        .btn-add:hover{background:#a00d25;}
        .list-card{background:var(--surface);border:1px solid var(--border);}
        .list-card-header{padding:1rem 1.5rem;border-bottom:1px solid var(--border);font-family:var(--mono);font-size:0.62rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);}
        table{width:100%;border-collapse:collapse;}
        td{padding:0.85rem 1.5rem;font-size:0.83rem;border-bottom:1px solid var(--border);}
        tr:last-child td{border-bottom:none;}
        tr:hover td{background:rgba(255,255,255,0.02);}
        .cat-badge{font-family:var(--mono);font-size:0.65rem;padding:0.25rem 0.7rem;background:rgba(196,154,42,0.12);color:var(--gold);border:1px solid rgba(196,154,42,0.25);}
        .btn-del{font-family:var(--sans);font-size:0.62rem;letter-spacing:0.08em;text-transform:uppercase;padding:0.3rem 0.7rem;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all 0.2s;}
        .btn-del:hover{border-color:var(--accent);color:var(--accent);}
    </style>
</head>
<body>
<aside class="sidebar">
    <div class="sidebar-brand">
        <a href="/articles">Collab<span>Ink</span></a>
        <p>Panneau Admin</p>
    </div>
    <nav class="sidebar-nav">
        <p class="nav-section">Navigation</p>
        <a th:href="@{/admin/dashboard}" class="nav-item">◈ Dashboard</a>
        <a th:href="@{/admin/users}" class="nav-item">◉ Utilisateurs</a>
        <a th:href="@{/admin/articles}" class="nav-item">◧ Articles</a>
        <a th:href="@{/admin/categories}" class="nav-item active">◫ Catégories</a>
        <p class="nav-section">Blog</p>
        <a th:href="@{/articles}" class="nav-item">↗ Voir le blog</a>
    </nav>
    <div class="sidebar-footer">
        <form th:action="@{/logout}" method="post" class="logout-form">
            <button type="submit">↩ Déconnexion</button>
        </form>
    </div>
</aside>
<main class="main">
    <div class="main-header">
        <h1>Catégories</h1>
        <p th:text="${categories.size()} + ' catégories créées'">0 catégories</p>
    </div>
    <div class="main-body">
        <div class="add-card">
            <h3>Nouvelle catégorie</h3>
            <form th:action="@{/admin/categories/save}" th:object="${nouvelleCategorie}" method="post">
                <input type="hidden" th:field="*{id}"/>
                <div class="field">
                    <label>Nom</label>
                    <input type="text" th:field="*{nom}" placeholder="Ex: Technologie" required/>
                </div>
                <button type="submit" class="btn-add">+ Ajouter</button>
            </form>
        </div>
        <div class="list-card">
            <div class="list-card-header">
                Catégories existantes (<span th:text="${categories.size()}">0</span>)
            </div>
            <table>
                <tbody>
                <tr th:each="cat : ${categories}">
                    <td style="color:var(--muted);font-family:var(--mono);font-size:0.7rem;" th:text="${cat.id}">1</td>
                    <td><span class="cat-badge" th:text="${cat.nom}">Catégorie</span></td>
                    <td style="color:var(--muted);font-size:0.75rem;" th:text="${cat.articles.size()} + ' articles'">0 articles</td>
                    <td style="text-align:right;">
                        <form th:action="@{/admin/categories/{id}/delete(id=${cat.id})}" method="post"
                              onsubmit="return confirm('Supprimer cette catégorie ?')">
                            <button type="submit" class="btn-del">Supprimer</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(categories)}">
                    <td colspan="4" style="text-align:center;color:var(--muted);">Aucune catégorie.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
</body>
</html>
