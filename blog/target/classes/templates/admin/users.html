<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Utilisateurs — Admin · CollabInk</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&family=DM+Mono&display=swap" rel="stylesheet"/>
    <style>
        :root{--bg:#0a0a0f;--surface:#13131a;--border:#1e1e2e;--text:#e8e4dc;--muted:#6b6875;--accent:#c8102e;--gold:#c49a2a;--serif:'Playfair Display',serif;--sans:'DM Sans',sans-serif;--mono:'DM Mono',monospace;}
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        body{background:var(--bg);color:var(--text);font-family:var(--sans);font-weight:300;display:flex;min-height:100vh;}
        .sidebar{width:240px;min-width:240px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;}
        .sidebar-brand{padding:1.5rem;border-bottom:1px solid var(--border);}
        .sidebar-brand a{font-family:var(--serif);font-size:1.4rem;font-weight:700;text-decoration:none;color:var(--text);}
        .sidebar-brand a span{color:var(--accent);}
        .sidebar-brand p{font-family:var(--mono);font-size:0.58rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-top:0.2rem;}
        .sidebar-nav{flex:1;padding:1rem 0;}
        .nav-section{font-family:var(--mono);font-size:0.55rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);padding:1rem 1.5rem 0.4rem;}
        .nav-item{display:flex;align-items:center;gap:0.75rem;padding:0.65rem 1.5rem;text-decoration:none;color:var(--muted);font-size:0.85rem;transition:all 0.2s;border-left:2px solid transparent;}
        .nav-item:hover{color:var(--text);background:rgba(255,255,255,0.03);}
        .nav-item.active{color:var(--text);border-left-color:var(--accent);background:rgba(200,16,46,0.06);}
        .sidebar-footer{padding:1rem;border-top:1px solid var(--border);}
        .logout-form button{width:100%;padding:0.6rem;background:transparent;border:1px solid var(--border);color:var(--muted);font-family:var(--sans);font-size:0.75rem;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;transition:all 0.2s;}
        .logout-form button:hover{border-color:var(--accent);color:var(--accent);}
        .main{flex:1;overflow-y:auto;}
        .main-header{padding:2rem 2.5rem 1.5rem;border-bottom:1px solid var(--border);}
        .main-header h1{font-family:var(--serif);font-size:2rem;}
        .main-header p{font-family:var(--mono);font-size:0.65rem;letter-spacing:0.1em;color:var(--muted);margin-top:0.2rem;}
        .main-body{padding:2rem 2.5rem;}
        table{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--border);}
        th{font-family:var(--mono);font-size:0.58rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);padding:0.9rem 1.2rem;text-align:left;border-bottom:1px solid var(--border);}
        td{padding:0.85rem 1.2rem;font-size:0.82rem;border-bottom:1px solid var(--border);}
        tr:last-child td{border-bottom:none;}
        tr:hover td{background:rgba(255,255,255,0.02);}
        .role-badge{font-family:var(--mono);font-size:0.58rem;padding:0.2rem 0.6rem;border:1px solid;}
        .role-ADMIN{color:#c8102e;border-color:rgba(200,16,46,0.4);background:rgba(200,16,46,0.08);}
        .role-AUTEUR{color:var(--gold);border-color:rgba(196,154,42,0.4);background:rgba(196,154,42,0.08);}
        .role-LECTEUR{color:var(--muted);border-color:var(--border);}
        .btn-act{font-family:var(--sans);font-size:0.62rem;letter-spacing:0.08em;text-transform:uppercase;padding:0.3rem 0.65rem;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all 0.2s;}
        .btn-act:hover{color:var(--text);border-color:var(--muted);}
        .btn-act.danger:hover{border-color:var(--accent);color:var(--accent);}
        select.role-select{background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:0.7rem;padding:0.3rem 0.5rem;cursor:pointer;}
    </style>
</head>
<body>
<aside class="sidebar">
    <div class="sidebar-brand">
        <a href="/articles">Collab<span>Ink</span></a>
        <p>Panneau Admin</p>
    </div>
    <nav class="sidebar-nav">
        <p class="nav-section">Navigation</p>
        <a th:href="@{/admin/dashboard}" class="nav-item">◈ Dashboard</a>
        <a th:href="@{/admin/users}" class="nav-item active">◉ Utilisateurs</a>
        <a th:href="@{/admin/articles}" class="nav-item">◧ Articles</a>
        <a th:href="@{/admin/categories}" class="nav-item">◫ Catégories</a>
        <p class="nav-section">Blog</p>
        <a th:href="@{/articles}" class="nav-item">↗ Voir le blog</a>
    </nav>
    <div class="sidebar-footer">
        <form th:action="@{/logout}" method="post" class="logout-form">
            <button type="submit">↩ Déconnexion</button>
        </form>
    </div>
</aside>
<main class="main">
    <div class="main-header">
        <h1>Utilisateurs</h1>
        <p th:text="${users.size()} + ' utilisateurs inscrits'">0 utilisateurs</p>
    </div>
    <div class="main-body">
        <table>
            <thead>
            <tr>
                <th>#</th>
                <th>Nom</th>
                <th>Email</th>
                <th>Rôle actuel</th>
                <th>Articles</th>
                <th>Changer le rôle</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="u : ${users}">
                <td style="color:var(--muted);font-family:var(--mono);font-size:0.7rem;" th:text="${u.id}">1</td>
                <td style="font-weight:500;" th:text="${u.nom}">Nom</td>
                <td style="color:var(--muted);font-size:0.78rem;" th:text="${u.email}">email</td>
                <td>
                    <span class="role-badge"
                          th:classappend="'role-' + ${u.role}"
                          th:text="${u.role}">ROLE</span>
                </td>
                <td style="color:var(--muted);" th:text="${u.articles.size()}">0</td>
                <td>
                    <form th:action="@{/admin/users/{id}/role(id=${u.id})}" method="post" style="display:flex;gap:0.4rem;align-items:center;">
                        <select name="role" class="role-select">
                            <option th:each="r : ${roles}"
                                    th:value="${r}"
                                    th:text="${r}"
                                    th:selected="${r == u.role}">ROLE</option>
                        </select>
                        <button type="submit" class="btn-act">OK</button>
                    </form>
                </td>
                <td>
                    <form th:action="@{/admin/users/{id}/delete(id=${u.id})}" method="post"
                          onsubmit="return confirm('Supprimer cet utilisateur ?')">
                        <button type="submit" class="btn-act danger">Supprimer</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(users)}">
                <td colspan="7" style="text-align:center;color:var(--muted);">Aucun utilisateur.</td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
