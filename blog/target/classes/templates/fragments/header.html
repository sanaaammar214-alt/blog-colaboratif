<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<body>
<header th:fragment="header" id="header" class="header d-flex align-items-center sticky-top">
    <div class="container position-relative d-flex align-items-center justify-content-between">

        <a th:href="@{/}" class="logo me-auto me-xl-0">
            <span class="logo-mark">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M19 3C19 3 17 8 12 10.5C8.5 12 5 11.5 3 13C5 15 8.5 15.5 11 14.2L9 22H11.5L13.5 15C16 13.8 19 10.5 20.5 5.5L19 3Z" fill="#c9a84c"/>
                    <line x1="9" y1="22" x2="3" y2="22" stroke="#c9a84c" stroke-width="1" opacity="0.4"/>
                </svg>
            </span>
            <span class="logo-wordmark">
                <span class="c1">Collab</span><span class="c2">Ink</span>
            </span>
        </a>

        <nav id="navmenu" class="navmenu">
            <ul>
                <li><a th:href="@{/}">Accueil</a></li>
                <li><a th:href="@{/articles}">Articles</a></li>

                <!-- Catégories dynamiques depuis la BDD -->
                <li class="dropdown" th:if="${categories != null and !categories.isEmpty()}">
                    <a href="#"><span>Catégories</span> <i class="bi bi-chevron-down toggle-dropdown"></i></a>
                    <ul>
                        <li th:each="cat : ${categories}">
                            <a th:href="@{/articles(categorieId=${cat.id})}" th:text="${cat.nom}">Catégorie</a>
                        </li>
                    </ul>
                </li>

                <li><a th:href="@{/about}">À propos</a></li>
                <li><a th:href="@{/contact}">Contact</a></li>

                <!-- Bouton Devenir Auteur pour LECTEUR (Bien visible) -->
                <li sec:authorize="hasRole('LECTEUR')">
                    <form th:action="@{/articles/devenir-auteur}" method="post" class="d-inline">
                        <button type="submit" class="btn-nav-write" style="background:#c9a84c; color:#111; border:none; padding: 0.5rem 1rem; border-radius: 4px; font-weight: 600; cursor: pointer;">
                            <i class="bi bi-pencil-square"></i> Devenir Auteur
                        </button>
                    </form>
                </li>

                <!-- Lien Écrire pour AUTEUR/ADMIN -->
                <li sec:authorize="hasAnyRole('AUTEUR','ADMIN')">
                    <a th:href="@{/articles/new}" class="btn-nav-write">
                        <i class="bi bi-pencil-square"></i> Écrire
                    </a>
                </li>

                <!-- Admin -->
                <li sec:authorize="hasRole('ADMIN')">
                    <a th:href="@{/admin/dashboard}">Espace Admin</a>
                </li>

                <!-- Non connecté -->
                <li sec:authorize="isAnonymous()"><a th:href="@{/login}">Connexion</a></li>
                <li sec:authorize="isAnonymous()"><a th:href="@{/register}">Inscription</a></li>

                <!-- Connecté : nom + logout -->
                <li sec:authorize="isAuthenticated()" class="dropdown">
                    <a href="#">
                        <i class="bi bi-person-circle"></i>
                        <span th:text="${currentUserNom != null} ? ${currentUserNom} : 'Mon compte'">Utilisateur</span>
                        <i class="bi bi-chevron-down toggle-dropdown"></i>
                    </a>
                    <ul>
                        <li sec:authorize="hasAnyRole('AUTEUR','ADMIN')">
                            <a th:href="@{/articles/mes-articles}"><i class="bi bi-journal-text"></i> Mes Articles</a>
                        </li>
                        <li>
                            <form th:action="@{/logout}" method="post">
                                <button type="submit" style="background:none;border:none;padding:0.4rem 1rem;color:inherit;cursor:pointer;width:100%;text-align:left;">
                                    <i class="bi bi-box-arrow-right"></i> Déconnexion
                                </button>
                            </form>
                        </li>
                    </ul>
                </li>
            </ul>
            <i class="mobile-nav-toggle d-xl-none bi bi-list"></i>
        </nav>

        <div class="header-social-links">
            <a href="#"><i class="bi bi-twitter-x"></i></a>
            <a href="#"><i class="bi bi-facebook"></i></a>
            <a href="#"><i class="bi bi-instagram"></i></a>
        </div>
    </div>
</header>
</body>
</html>
