<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::body})}">
<body>
<section class="section" style="padding: 5rem 0;">
    <div class="container" style="max-width: 480px;">
        <h2 class="mb-1" style="font-family:'EB Garamond',serif;font-size:2rem;">Connexion</h2>
        <p class="text-muted mb-4">Bienvenue sur CollabInk</p>

        <div class="alert alert-danger d-flex align-items-center" th:if="${param.error}">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            Identifiants incorrects. Vérifiez votre email et mot de passe.
        </div>
        <div class="alert alert-success d-flex align-items-center" th:if="${param.logout}">
            <i class="bi bi-check-circle-fill me-2"></i>
            Déconnexion réussie.
        </div>
        <div class="alert alert-success d-flex align-items-center" th:if="${param.registered}">
            <i class="bi bi-check-circle-fill me-2"></i>
            Compte créé ! Vous pouvez vous connecter.
        </div>

        <form th:action="@{/login}" method="post" class="p-4 border rounded-3 bg-white shadow-sm">
            <div class="mb-3">
                <label class="form-label fw-semibold">Email</label>
                <input class="form-control" type="email" name="username" placeholder="votre@email.com" required autofocus>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">Mot de passe</label>
                <input class="form-control" type="password" name="password" placeholder="••••••••" required>
            </div>
            <button class="btn w-100 fw-bold" type="submit"
                    style="background:#c9a84c;color:#111;border:none;padding:0.75rem;">
                Se connecter
            </button>
            <hr class="my-3">
            <p class="text-center mb-0 text-muted">
                Pas encore de compte ?
                <a th:href="@{/register}" style="color:#c9a84c;">Créer un compte</a>
            </p>
        </form>
    </div>
</section>
</body>
</html>
