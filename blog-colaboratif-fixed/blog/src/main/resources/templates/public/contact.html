<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::body})}">
<body>

<div class="page-title">
    <div class="container d-lg-flex justify-content-between align-items-center">
        <h1 class="mb-2 mb-lg-0">Contact</h1>
        <nav class="breadcrumbs">
            <ol>
                <li><a th:href="@{/}">Accueil</a></li>
                <li class="current">Contact</li>
            </ol>
        </nav>
    </div>
</div>

<section class="section">
    <div class="container">
        <div class="row gy-4">
            <div class="col-lg-4">
                <div class="info-item d-flex gap-3 mb-4">
                    <i class="bi bi-geo-alt fs-4" style="color:#c9a84c;"></i>
                    <div>
                        <h5>Adresse</h5>
                        <p class="text-muted mb-0">Casablanca, Maroc — Maarif</p>
                    </div>
                </div>
                <div class="info-item d-flex gap-3 mb-4">
                    <i class="bi bi-telephone fs-4" style="color:#c9a84c;"></i>
                    <div>
                        <h5>Téléphone</h5>
                        <p class="text-muted mb-0">+212 640 353 137</p>
                    </div>
                </div>
                <div class="info-item d-flex gap-3">
                    <i class="bi bi-envelope fs-4" style="color:#c9a84c;"></i>
                    <div>
                        <h5>Email</h5>
                        <p class="text-muted mb-0">contact@collabink.ma</p>
                    </div>
                </div>
            </div>
            <div class="col-lg-8">
                <div class="p-4 bg-white border rounded-3 shadow-sm">
                    <h4 class="mb-4" style="font-family:'EB Garamond',serif;">Envoyez-nous un message</h4>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Nom</label>
                            <input type="text" class="form-control" placeholder="Votre nom">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Email</label>
                            <input type="email" class="form-control" placeholder="votre@email.com">
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-semibold">Sujet</label>
                            <input type="text" class="form-control" placeholder="Sujet du message">
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-semibold">Message</label>
                            <textarea class="form-control" rows="6" placeholder="Votre message..."></textarea>
                        </div>
                        <div class="col-12">
                            <button class="btn fw-semibold px-4"
                                    style="background:#c9a84c;color:#111;border:none;padding:0.75rem 2rem;">
                                <i class="bi bi-send me-1"></i> Envoyer
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

</body>
</html>
